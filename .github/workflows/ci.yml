name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      - run: cargo test --no-default-features

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo clippy --all-features -- -D warnings
      - run: cargo fmt --check

  check-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-features
      - run: cargo check --no-default-features
      - run: cargo check --no-default-features --features safety_monitor
      - run: cargo check --no-default-features --features camera
      - run: cargo check --no-default-features --features telescope
      - run: cargo check --no-default-features --features dome

  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx @scalar/cli validate tests/fixtures/AlpacaDeviceAPI_v1.yaml
      - run: npx @scalar/cli validate tests/fixtures/AlpacaManagementAPI_v1.yaml

  conformu:
    runs-on: ubuntu-latest
    needs: [test, lint]
    env:
      CONFORMU_VERSION: "4.2.1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download ConformU
        run: |
          curl -sL "https://github.com/ASCOMInitiative/ConformU/releases/download/v${CONFORMU_VERSION}/conformu-linux-x64-${CONFORMU_VERSION}.tar.gz" \
            -o conformu.tar.gz
          tar xzf conformu.tar.gz
          chmod +x conformu
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Build test harness
        run: cargo build --example conformu_harness --features conformu --release

      - name: Start test harness
        run: |
          cargo run --example conformu_harness --features conformu --release &
          HARNESS_PID=$!
          echo "HARNESS_PID=$HARNESS_PID" >> "$GITHUB_ENV"
          sleep 3
          curl -sf http://127.0.0.1:32888/management/apiversions || (echo "Harness failed to start" && exit 1)

      - name: ConformU — all devices
        run: |
          DEVICES=(
            "safetymonitor/0"
            "camera/0"
            "switch/0"
            "covercalibrator/0"
            "dome/0"
            "filterwheel/0"
            "focuser/0"
            "observingconditions/0"
            "rotator/0"
            "telescope/0"
          )
          for device in "${DEVICES[@]}"; do
            SLUG=$(echo "$device" | tr '/' '-')
            echo "::group::ConformU — $device"
            conformu conformance "http://127.0.0.1:32888/api/v1/$device" \
              --resultsfile "conformu-${SLUG}.json" \
              --logfilename "conformu-${SLUG}.log" \
              || true
            echo "::endgroup::"
          done

      - name: Stop test harness
        if: always()
        run: kill $HARNESS_PID 2>/dev/null || true

      - name: Convert results to JUnit XML and check for errors
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys
          import xml.etree.ElementTree as ET

          root = ET.Element("testsuites")
          total_errors = 0
          total_issues = 0

          for f in sorted(glob.glob("conformu-*.json")):
              try:
                  data = json.load(open(f))
                  name = f.replace("conformu-", "").replace(".json", "")
                  error_count = data.get("ErrorCount", 0)
                  issue_count = data.get("IssueCount", 0)
                  total_errors += error_count
                  total_issues += issue_count

                  # Create a test suite per device
                  suite = ET.SubElement(root, "testsuite",
                      name=name,
                      tests=str(error_count + issue_count + 1),
                      failures=str(error_count))

                  # Add a pass/fail test case for the device
                  tc = ET.SubElement(suite, "testcase",
                      name=f"{name}-conformance",
                      classname=f"conformu.{name}")
                  if error_count > 0:
                      fail = ET.SubElement(tc, "failure",
                          message=f"{error_count} conformance errors")
                      error_msgs = []
                      for e in data.get("Errors", []):
                          error_msgs.append(f"{e['Key']}: {e['Value']}")
                      fail.text = "\n".join(error_msgs)

                  # Add individual errors as test cases
                  for e in data.get("Errors", []):
                      etc = ET.SubElement(suite, "testcase",
                          name=e["Key"],
                          classname=f"conformu.{name}.errors")
                      ef = ET.SubElement(etc, "failure", message="ConformU error")
                      ef.text = e["Value"]

                  # Add issues as skipped test cases (informational)
                  for i in data.get("Issues", []):
                      itc = ET.SubElement(suite, "testcase",
                          name=i["Key"],
                          classname=f"conformu.{name}.issues")
                      ET.SubElement(itc, "skipped", message=i["Value"])

                  print(f"{name}: {error_count} errors, {issue_count} issues")
              except Exception as e:
                  print(f"Warning: Could not parse {f}: {e}")

          tree = ET.ElementTree(root)
          ET.indent(tree, space="  ")
          tree.write("conformu-results.xml", xml_declaration=True, encoding="utf-8")
          print(f"\nTotal: {total_errors} errors, {total_issues} issues")
          if total_errors > 0:
              print(f"::error::ConformU found {total_errors} conformance errors")
              sys.exit(1)
          PYEOF

      - name: Upload ConformU results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformu-results
          path: |
            conformu-*.json
            conformu-*.log
            conformu-results.xml

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: ConformU Results
          path: conformu-results.xml
          reporter: java-junit
