name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      - run: cargo test --no-default-features

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo clippy --all-features -- -D warnings
      - run: cargo fmt --check

  check-features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --all-features
      - run: cargo check --no-default-features
      - run: cargo check --no-default-features --features safety_monitor
      - run: cargo check --no-default-features --features camera
      - run: cargo check --no-default-features --features telescope
      - run: cargo check --no-default-features --features dome

  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx @scalar/cli validate tests/fixtures/AlpacaDeviceAPI_v1.yaml
      - run: npx @scalar/cli validate tests/fixtures/AlpacaManagementAPI_v1.yaml
